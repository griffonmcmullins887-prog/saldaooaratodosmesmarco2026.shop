<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#7c3aed,#a855f7,#e9d5ff);
color:white;
}

/* HERO */

.hero{
padding:40px 20px 10px;
text-align:center;
}

/* MEGA FEIRÃO GRANDE */

.brand{
font-size:42px;
font-weight:900;
background:linear-gradient(90deg,#facc15,#f97316);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 5px 25px rgba(0,0,0,0.6);
animation:pulse 1.5s infinite;
}

/* ANIMAÇÃO */

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* TITULO */

.hero h1{
font-size:28px;
margin:10px 0 5px;
font-weight:800;
}

/* SUB */

.hero p{
font-size:14px;
color:#ede9fe;
}

/* CARD */

.card{
background:white;
color:#0f172a;
margin:20px;
border-radius:20px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

/* PREÇO */

.price{
margin:20px 0;
}

.old{
text-decoration:line-through;
color:#64748b;
}

.new{
font-size:40px;
font-weight:900;
color:#7c3aed;
}

/* BENEFICIOS */

.list{
text-align:left;
margin:20px 0;
}

.list div{
margin-bottom:10px;
font-size:14px;
}

/* BOTÃO */

.cta{
display:block;
background:linear-gradient(90deg,#7c3aed,#c084fc);
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:900;
text-decoration:none;
color:white;
box-shadow:0 10px 40px rgba(124,58,237,0.6);
transition:0.3s;
}

.cta:hover{
transform:scale(1.07);
}

/* ALERTA */

.timer{
background:#f3e8ff;
color:#6b21a8;
padding:12px;
border-radius:10px;
font-size:13px;
margin-top:15px;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#ddd6fe;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="hero">

<div class="brand">🔥 MEGA FEIRÃO</div>

<h1>OFERTA LIBERADA HOJE</h1>
<p>Aproveite antes que acabe</p>

</div>

<div class="card">

<div class="price">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 79,97</div>
</div>

<div class="list">
<div>✔ Desconto exclusivo liberado</div>
<div>✔ Acesso imediato</div>
<div>✔ Suporte disponível</div>
</div>

<a class="cta" href="https://shawanawichterman257-arch.github.io/liquidacaofeiraodemarco2026/inicio/">
GARANTIR AGORA →
</a>

<div class="timer">
⚠ ÚLTIMAS VAGAS DISPONÍVEIS
</div>

</div>

<div class="footer">
🔒 Ambiente seguro • Pagamento protegido
</div>

</body>
</html>
